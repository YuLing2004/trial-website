<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Draft for Everything</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <main class="container">
      <header class="topbar">
        <div class="brand">
          <span class="logo"></span>
          <span>Everything</span>
        </div>
        <button class="ghost-btn">登录</button>
      </header>

      <section class="hero">
        <p class="eyebrow">Draft for Everything</p>
        <h1>把灵感变成可交付的产品页面</h1>
        <p class="subtitle">
          这是一个根据你提供的 Figma 主题意图还原的网页原型：简洁、现代、卡片式布局与柔和渐变背景。
        </p>

        <div class="actions">
          <button class="primary-btn">开始创作</button>
          <button class="secondary-btn">查看示例</button>
        </div>
      </section>

      <section class="cards">
        <article class="card">
          <h3>快速搭建</h3>
          <p>组件化区域与统一间距系统，让页面结构更清晰。</p>
        </article>
        <article class="card">
          <h3>一致视觉</h3>
          <p>配色、圆角、阴影和按钮状态保持一致，提升整体品质感。</p>
        </article>
        <article class="card">
          <h3>响应式布局</h3>
          <p>在桌面与移动端下都能自动调整内容宽度与排版密度。</p>
        </article>
      </section>
    </main>
  </body>
</html>
